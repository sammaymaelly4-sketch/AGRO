<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produtos — Sentinela Agro ERP</title>
  <meta name="description" content="Gestão de produtos do Sentinela Agro ERP" />
  <meta name="theme-color" content="#0a0f1a" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app-layout">
    <div class="main-content" id="mainContent">
      <div class="page-content">
        <div class="page-header">
          <div class="page-header-info">
            <h1>📦 Produtos</h1>
            <p>Cadastro e controle de produtos</p>
          </div>
          <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab active" data-filter="todos">Todos</button>
            <button class="filter-tab" data-filter="milho">🌽 Milho</button>
            <button class="filter-tab" data-filter="soja">🫘 Soja</button>
            <button class="filter-tab" data-filter="racao">🐄 Ração</button>
            <button class="filter-tab" data-filter="suplemento">💊 Suplemento</button>
            <button class="filter-tab" data-filter="outros">📋 Outros</button>
          </div>
        </div>
        <div id="produtosTable"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initAuth, requireAuth, isAdmin } from '/js/auth.js';
    import { db, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from '/js/firebase-config.js';
    import { renderSidebar, renderTopbar, renderDataTable, showModal, showToast, showConfirm, buildForm, getFormData } from '/js/components.js';
    import { formatCurrency, formatDate, formatQuantity, ICONS, ENUM_LABELS, validateRequired, getStockStatusBadge } from '/js/utils.js';

    initAuth();

    (async () => {
      const userData = await requireAuth();
      renderSidebar('produtos');
      renderTopbar({ title: 'Produtos', subtitle: 'Catálogo e preços', user: userData });

      let produtos = [];
      let activeFilter = 'todos';
      let tableInstance = null;

      const formFields = [
        { name: 'nome', label: 'Nome do Produto', type: 'text', placeholder: 'Ex: Milho Grão Seco', required: true },
        { type: 'row', fields: [
          { name: 'tipo', label: 'Tipo / Categoria', type: 'select', required: true, options: Object.entries(ENUM_LABELS.tipo_produto).map(([v, l]) => ({ value: v, label: l })) },
          { name: 'unidade', label: 'Unidade', type: 'select', required: true, options: Object.entries(ENUM_LABELS.unidade).map(([v, l]) => ({ value: v, label: l })) }
        ]},
        { type: 'row', fields: [
          { name: 'preco_venda', label: 'Preço de Venda (R$)', type: 'number', step: '0.01', min: 0, required: true },
          { name: 'custo', label: 'Custo (R$)', type: 'number', step: '0.01', min: 0 }
        ]},
        { type: 'row', fields: [
          { name: 'estoque', label: 'Estoque Atual', type: 'number', step: '0.01', min: 0, required: true },
          { name: 'estoque_minimo', label: 'Estoque Mínimo', type: 'number', step: '0.01', min: 0, required: true }
        ]},
        { name: 'ativo', label: 'Produto ativo', type: 'toggle' }
      ];

      function openProdutoForm(produto = null) {
        const isEdit = !!produto;
        const fields = formFields.map(f => {
          if (f.type === 'row') {
            return { ...f, fields: f.fields.map(ff => ({ ...ff, value: produto?.[ff.name] ?? (ff.type === 'number' ? '' : '') })) };
          }
          if (f.name === 'ativo') return { ...f, value: produto ? produto.ativo : true };
          return { ...f, value: produto?.[f.name] ?? '' };
        });

        const { element, close } = showModal({
          title: isEdit ? 'Editar Produto' : 'Novo Produto',
          content: `
            <form id="produtoForm">${buildForm(fields)}</form>
            ${isEdit ? `
              <div style="margin-top:16px;padding:12px 16px;background:var(--bg-tertiary);border-radius:var(--radius-md)">
                <div style="font-size:12px;color:var(--text-muted)">Margem de lucro</div>
                <div id="margemLucro" style="font-size:16px;font-weight:700;color:var(--accent-green)">—</div>
              </div>
            ` : ''}
          `,
          footer: `
            <button class="btn btn-secondary" id="cancelBtn">Cancelar</button>
            <button class="btn btn-primary" id="saveBtn">${isEdit ? 'Salvar' : 'Cadastrar'}</button>
          `
        });

        // Calcula margem em tempo real
        const precoInput = element.querySelector('#preco_venda');
        const custoInput = element.querySelector('#custo');
        const margemEl = element.querySelector('#margemLucro');
        
        function calcMargem() {
          if (!margemEl) return;
          const preco = parseFloat(precoInput?.value) || 0;
          const custo = parseFloat(custoInput?.value) || 0;
          if (preco > 0 && custo > 0) {
            const margem = ((preco - custo) / custo * 100).toFixed(1);
            margemEl.textContent = `${margem}% (${formatCurrency(preco - custo)} por unidade)`;
            margemEl.style.color = margem > 0 ? 'var(--accent-green)' : 'var(--accent-red)';
          } else {
            margemEl.textContent = '—';
          }
        }
        precoInput?.addEventListener('input', calcMargem);
        custoInput?.addEventListener('input', calcMargem);
        calcMargem();

        element.querySelector('#cancelBtn').addEventListener('click', close);
        element.querySelector('#saveBtn').addEventListener('click', async () => {
          const data = getFormData(element.querySelector('#produtoForm'));
          
          const validation = validateRequired({ Nome: data.nome, Tipo: data.tipo, Unidade: data.unidade, 'Preço de Venda': data.preco_venda, Estoque: data.estoque, 'Estoque Mínimo': data.estoque_minimo });
          if (!validation.valid) {
            showToast(validation.errors[0], 'error');
            return;
          }

          // Converte números
          data.preco_venda = parseFloat(data.preco_venda) || 0;
          data.custo = parseFloat(data.custo) || 0;
          data.estoque = parseFloat(data.estoque) || 0;
          data.estoque_minimo = parseFloat(data.estoque_minimo) || 0;

          try {
            if (isEdit) {
              await updateDoc(doc(db, 'produtos', produto.id), data);
              showToast('Produto atualizado!', 'success');
            } else {
              data.created_at = serverTimestamp();
              if (data.ativo === undefined) data.ativo = true;
              await addDoc(collection(db, 'produtos'), data);
              showToast('Produto cadastrado!', 'success');
            }
            close();
          } catch (error) {
            showToast('Erro: ' + error.message, 'error');
          }
        });
      }

      function getFilteredData() {
        if (activeFilter === 'todos') return produtos;
        return produtos.filter(p => p.tipo === activeFilter);
      }

      function renderTable() {
        const data = getFilteredData();
        
        tableInstance = renderDataTable({
          containerId: 'produtosTable',
          title: 'Produtos',
          columns: [
            { key: 'nome', label: 'Produto', render: (v, row) => `
              <div style="display:flex;align-items:center;gap:10px">
                <div>
                  <div style="font-weight:600;color:var(--text-primary)">${v || '—'}</div>
                  <div style="font-size:12px;color:var(--text-muted)">${ENUM_LABELS.tipo_produto[row.tipo] || row.tipo}</div>
                </div>
              </div>
            `},
            { key: 'unidade', label: 'Unidade', render: (v) => ENUM_LABELS.unidade_short[v] || v },
            { key: 'preco_venda', label: 'Preço Venda', render: (v) => `<span style="font-weight:600;color:var(--accent-green)">${formatCurrency(v)}</span>` },
            { key: 'custo', label: 'Custo', render: (v) => v ? formatCurrency(v) : '—' },
            { key: 'estoque', label: 'Estoque', render: (v, row) => {
              const status = getStockStatusBadge(v, row.estoque_minimo);
              return `<span class="badge ${status.class}">${v} ${ENUM_LABELS.unidade_short[row.unidade] || ''}</span>`;
            }},
            { key: 'ativo', label: 'Status', render: (v) => v !== false ? '<span class="badge badge-success">Ativo</span>' : '<span class="badge badge-neutral">Inativo</span>' }
          ],
          data: data,
          searchFields: ['nome', 'tipo'],
          onAdd: () => openProdutoForm(),
          addLabel: 'Novo Produto',
          emptyMessage: 'Nenhum produto cadastrado',
          emptyIcon: '📦',
          actions: [
            { id: 'edit', label: 'Editar', icon: ICONS.edit, handler: (item) => openProdutoForm(item) },
            { id: 'delete', label: 'Excluir', icon: ICONS.trash, adminOnly: true, handler: async (item) => {
              const confirmed = await showConfirm({
                title: 'Excluir Produto',
                message: `Excluir <strong>${item.nome}</strong>?`,
                type: 'danger',
                confirmText: 'Excluir'
              });
              if (confirmed) {
                try {
                  await deleteDoc(doc(db, 'produtos', item.id));
                  showToast('Produto excluído', 'success');
                } catch (error) {
                  showToast('Erro: ' + error.message, 'error');
                }
              }
            }}
          ]
        });
      }

      // Filter tabs
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          activeFilter = tab.dataset.filter;
          renderTable();
        });
      });

      // Listener em tempo real
      onSnapshot(collection(db, 'produtos'), (snapshot) => {
        produtos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        produtos.sort((a, b) => (a.nome || '').localeCompare(b.nome || ''));
        renderTable();
      });
    })();
  </script>
</body>
</html>
